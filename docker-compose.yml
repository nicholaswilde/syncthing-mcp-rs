services:
  mcp-server:
    build: .
    environment:
      - SYNCTHING_URL=http://syncthing:8384
      - SYNCTHING_API_KEY=${SYNCTHING_API_KEY}
    depends_on:
      - syncthing
    volumes:
      - ./data:/app/data

  syncthing:
    image: syncthing/syncthing:latest
    container_name: syncthing
    environment:
      - PUID=1000
      - PGID=1000
      - STGUIAPIKEY=${SYNCTHING_API_KEY}
    volumes:
      - ./syncthing/config:/var/syncthing/config
      - ./syncthing/data:/var/syncthing
    ports:
      - "8384:8384" # Web GUI
      - "22000:22000/tcp" # TCP listening port
      - "22000:22000/udp" # QUIC listening port
      - "21027:21027/udp" # Local discovery
