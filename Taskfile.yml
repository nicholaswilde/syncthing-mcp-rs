version: '3'

dotenv: ['.env']

vars:
  LOCAL_IP:
    sh: hostname -I | awk '{print $1}'
  BINARY: target/release/syncthing-mcp-rs

tasks:
  encrypt:
    desc: Encrypt files using SOPS
    preconditions:
      - sh: test -f .env
        msg: ".env file doens't exist"
    cmds:
      - sops -e --input-type dotenv --output-type dotenv .env > .env.enc

  decrypt:
    desc: Decrypt files using SOPS
    preconditions:
      - sh: test -f .env.enc
        msg: ".env.enc doesn't exist"
    cmds:
      - sops -d --input-type dotenv --output-type dotenv .env.enc > .env

  clippy:
    desc: Run cargo clippy
    cmds:
      - cargo clippy --workspace --all-targets --all-features -- -D warnings

  default:
    cmds:
      - task -l

  update:
    desc: Update all cargo dependencies
    cmds:
      - cargo update

  build:local:
    desc: Build the project in release mode for the current architecture
    cmds:
      - cargo build --release

  build:amd64:
    desc: Build for AMD64 (x86_64)
    cmds:
      - cross build --release --target x86_64-unknown-linux-gnu

  build:arm64:
    desc: Build for ARM64 (aarch64)
    cmds:
      - cross build --release --target aarch64-unknown-linux-gnu

  build:debug:
    desc: Build the project in debug mode
    cmds:
      - cargo build

  build:
    desc: Build for all supported architectures
    cmds:
      - task: build:amd64
      - task: build:arm64

  run:
    desc: Run the project
    cmds:
      - cargo run

  run:new-tools:
    desc: Run new tools against a live SyncThing instance (requires .env)
    preconditions:
      - sh: test -f .env
        msg: ".env file doesn't exist"
    cmds:
      - cargo run --example run_live_new_tools

  run:bandwidth-tools:
    desc: Run bandwidth tools against a live SyncThing instance (requires .env)
    preconditions:
      - sh: test -f .env
        msg: ".env file doesn't exist"
    cmds:
      - cargo run --example test_live_bandwidth_tools

  run:verify-api:
    desc: Verify new API methods against a live SyncThing instance (requires .env)
    preconditions:
      - sh: test -f .env
        msg: ".env file doesn't exist"
    cmds:
      - cargo run --example verify_api_live

  check:
    desc: Check code for errors without generating binary
    cmds:
      - cargo check

  test:
    desc: Run unit tests only
    cmds:
      - cargo test --lib --tests

  test:ci:
    desc: Run all checks (format, lint, and unit tests)
    cmds:
      - task: fmt:check
      - task: lint
      - task: test
      - task: clippy

  test:integration:
    desc: Run Docker integration tests (requires Docker)
    cmds:
      - RUN_DOCKER_TESTS=true cargo test --test docker_integration_test

  test:live:
    desc: Run tests against a live SyncThing instance (requires .env)
    preconditions:
      - sh: test -f .env
        msg: ".env file doesn't exist"
    cmds:
      - RUN_LIVE_TESTS=true cargo test --test live -- --nocapture

  test:live:conflicts:
    desc: Run conflict tools tests against a live SyncThing instance (requires .env)
    preconditions:
      - sh: test -f .env
        msg: ".env file doesn't exist"
    cmds:
      - cargo run --example test_live_conflict_tools

  fmt:
    desc: Format code with rustfmt
    cmds:
      - cargo fmt --all --check

  fmt:check:
    desc: Check code formatting with rustfmt
    cmds:
      - cargo fmt -- --check

  docs:
    desc: Generate documentation
    cmds:
      - cargo doc --no-deps

  docs:open:
    desc: Generate and open documentation
    cmds:
      - cargo doc --no-deps --open

  lint:
    desc: Lint code with clippy
    cmds:
      - cargo clippy -- -D warnings

  clean:
    desc: Clean build artifacts
    cmds:
      - cargo clean

  inspector:
    desc: Run MCP Inspector (requires npx)
    cmds:
      - task: build:local
      - npx @modelcontextprotocol/inspector {{.BINARY}}

  coverage:
    desc: Run tests and show coverage summary
    cmds:
      - cargo llvm-cov --workspace --all-features --summary-only

  coverage:report:
    desc: Generate coverage reports (lcov and html)
    cmds:
      - cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      - cargo llvm-cov --workspace --all-features --html

  coverage:upload:
    desc: Upload coverage report to Coveralls
    precondition:
      - sh: test -f lcov.info
        msg: "lcov.info doesn't exist"
    cmds:
      - coveralls report lcov.info  -n -r {{ .COVERALLS_REPO_TOKEN }}
    silent: true

  docker:build:
    desc: Build the Docker image
    cmds:
      - docker build -t syncthing-mcp-rs .

  docker:run:
    desc: Run the Docker image (requires .env)
    preconditions:
      - sh: test -f .env
        msg: ".env file doesn't exist"
    cmds:
      - docker run --rm --env-file .env syncthing-mcp-rs
